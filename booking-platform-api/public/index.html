<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-gray-800 antialiased">
    
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <h1 class="text-2xl font-bold text-blue-600">BookingApp</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="nav-home" class="text-gray-600 hover:text-gray-900 font-medium">Home</button>
                    <button id="nav-login" class="text-blue-600 hover:text-blue-800 font-medium">Admin Login</button>
                    <button id="nav-logout" class="hidden text-red-600 hover:text-red-800 font-medium">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="main-content">
        
        <!-- Public View: Book a Service -->
        <div id="public-view" class="space-y-8">
            <div class="text-center">
                <h2 class="text-4xl font-extrabold text-gray-900 sm:text-5xl">Book a Service</h2>
                <p class="mt-4 text-xl text-gray-500">Choose from our premium services below and book your slot today.</p>
            </div>
            
            <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
                <!-- Services will be loaded here dynamically -->
                <p class="text-gray-500">Loading services...</p>
            </div>
        </div>

        <!-- Login View -->
        <div id="login-view" class="hidden max-w-md mx-auto bg-white rounded-xl shadow-md p-8 border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Admin Login</h2>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="login-email" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Sign In
                </button>
                <p id="login-error" class="text-red-500 text-sm mt-2 hidden"></p>
            </form>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-view" class="hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-3xl font-bold text-gray-900">Admin Dashboard</h2>
                <button id="btn-create-service" class="bg-green-600 text-white px-4 py-2 rounded-md font-medium hover:bg-green-700">Create New Service</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Services Management -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                        <h3 class="text-lg font-medium text-gray-900">Manage Services</h3>
                    </div>
                    <ul id="admin-services-list" class="divide-y divide-gray-200 p-6 space-y-4">
                        <!-- Services loaded here -->
                    </ul>
                </div>
                
                <!-- Bookings Management -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                        <h3 class="text-lg font-medium text-gray-900">Manage Bookings</h3>
                    </div>
                    <ul id="admin-bookings-list" class="divide-y divide-gray-200 p-6 space-y-4">
                        <!-- Bookings loaded here -->
                    </ul>
                </div>
            </div>
        </div>

    </main>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden fixed inset-0 z-10 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal('booking-modal')"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">Book Service</h3>
                    <form id="booking-form" class="space-y-4">
                        <input type="hidden" id="book-service-id">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Name</label>
                            <input type="text" id="book-name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" id="book-email" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Phone</label>
                            <input type="text" id="book-phone" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Date</label>
                                <input type="date" id="book-date" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Time</label>
                                <input type="time" id="book-time" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                            </div>
                        </div>
                        <div class="mt-5 sm:mt-6 sm:grid sm:grid-cols-2 sm:gap-3 sm:grid-flow-row-dense">
                            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 sm:col-start-2 sm:text-sm">Book Now</button>
                            <button type="button" onclick="closeModal('booking-modal')" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:col-start-1 sm:text-sm">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Service Modal -->
    <div id="service-modal" class="hidden fixed inset-0 z-10 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeModal('service-modal')"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">Create New Service</h3>
                    <form id="service-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Title</label>
                            <input type="text" id="service-title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea id="service-desc" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Duration (mins)</label>
                                <input type="number" id="service-duration" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Price ($)</label>
                                <input type="number" step="0.01" id="service-price" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3">
                            </div>
                        </div>
                        <div class="mt-5 sm:mt-6 sm:grid sm:grid-cols-2 sm:gap-3 sm:grid-flow-row-dense">
                            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-green-600 text-base font-medium text-white hover:bg-green-700 sm:col-start-2 sm:text-sm">Create Service</button>
                            <button type="button" onclick="closeModal('service-modal')" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:col-start-1 sm:text-sm">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript Logic -->
    <script>
        const API_URL = 'http://localhost:3000';
        let currentToken = localStorage.getItem('token');

        // Navigation
        document.getElementById('nav-home').addEventListener('click', showPublicView);
        document.getElementById('nav-login').addEventListener('click', showLoginView);
        document.getElementById('nav-logout').addEventListener('click', logout);
        document.getElementById('btn-create-service').addEventListener('click', () => openModal('service-modal'));

        function showView(viewId) {
            ['public-view', 'login-view', 'admin-view'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
            updateNav();
        }

        function updateNav() {
            if (currentToken) {
                document.getElementById('nav-login').classList.add('hidden');
                document.getElementById('nav-logout').classList.remove('hidden');
                document.getElementById('nav-home').textContent = 'Dashboard';
            } else {
                document.getElementById('nav-login').classList.remove('hidden');
                document.getElementById('nav-logout').classList.add('hidden');
                document.getElementById('nav-home').textContent = 'Home';
            }
        }

        function showPublicView() {
            if (currentToken) {
                showAdminView();
            } else {
                showView('public-view');
                fetchServices();
            }
        }

        function showLoginView() {
            if (currentToken) showAdminView();
            else showView('login-view');
        }

        function showAdminView() {
            showView('admin-view');
            fetchAdminServices();
            fetchAdminBookings();
        }

        function logout() {
            localStorage.removeItem('token');
            currentToken = null;
            showPublicView();
        }

        function openModal(modalId) { document.getElementById(modalId).classList.remove('hidden'); }
        function closeModal(modalId) { document.getElementById(modalId).classList.add('hidden'); }

        // Fetch Services (Public)
        async function fetchServices() {
            try {
                const res = await fetch(`${API_URL}/services`);
                const services = await res.json();
                const grid = document.getElementById('services-grid');
                grid.innerHTML = '';
                
                services.forEach(s => {
                    if(!s.isActive) return;
                    grid.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col">
                            <h3 class="text-xl font-bold text-gray-900">${s.title}</h3>
                            <p class="mt-2 text-gray-500 flex-grow">${s.description}</p>
                            <div class="mt-4 flex items-center justify-between">
                                <span class="text-2xl font-bold text-gray-900">$${s.price}</span>
                                <span class="text-sm text-gray-500">${s.duration} mins</span>
                            </div>
                            <button onclick="openBookingModal('${s.id}')" class="mt-6 w-full bg-blue-600 text-white py-2 px-4 rounded-md font-medium hover:bg-blue-700">Book Appointment</button>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        function openBookingModal(serviceId) {
            document.getElementById('book-service-id').value = serviceId;
            // Set min date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('book-date').min = today;
            openModal('booking-modal');
        }

        // Handle Booking Submission
        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                serviceId: document.getElementById('book-service-id').value,
                customerName: document.getElementById('book-name').value,
                customerEmail: document.getElementById('book-email').value,
                customerPhone: document.getElementById('book-phone').value,
                bookingDate: document.getElementById('book-date').value,
                bookingTime: document.getElementById('book-time').value,
                notes: ''
            };
            
            try {
                const res = await fetch(`${API_URL}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('Booking successful!');
                    closeModal('booking-modal');
                    e.target.reset();
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.message}`);
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    currentToken = data.access_token;
                    showAdminView();
                } else {
                    document.getElementById('login-error').textContent = 'Invalid credentials';
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Admin: Fetch Services
        async function fetchAdminServices() {
            try {
                const res = await fetch(`${API_URL}/services`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if(res.status === 401) return logout();
                const services = await res.json();
                
                const list = document.getElementById('admin-services-list');
                list.innerHTML = '';
                services.forEach(s => {
                    list.innerHTML += `
                        <li class="flex justify-between items-center bg-white p-4 border rounded-md">
                            <div>
                                <p class="font-bold text-gray-900">${s.title}</p>
                                <p class="text-sm text-gray-500">$${s.price} - ${s.duration} mins - ${s.isActive ? 'Active' : 'Inactive'}</p>
                            </div>
                            <button onclick="deleteService('${s.id}')" class="text-red-600 hover:text-red-800 font-medium text-sm">Delete</button>
                        </li>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        // Admin: Fetch Bookings
        async function fetchAdminBookings() {
            try {
                const res = await fetch(`${API_URL}/bookings`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if(res.status === 401) return logout();
                const bookings = await res.json();
                
                const list = document.getElementById('admin-bookings-list');
                list.innerHTML = '';
                bookings.forEach(b => {
                    let statusColor = b.status === 'CONFIRMED' ? 'text-green-600' : (b.status === 'CANCELLED' ? 'text-red-600' : 'text-yellow-600');
                    list.innerHTML += `
                        <li class="bg-white p-4 border rounded-md">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold text-gray-900">${b.customerName}</p>
                                    <p class="text-sm text-gray-500">${b.customerEmail} | ${b.customerPhone}</p>
                                    <p class="text-sm font-medium text-gray-700 mt-1">Service: ${b.service ? b.service.title : 'N/A'}</p>
                                    <p class="text-sm text-gray-500">Date: ${b.bookingDate} at ${b.bookingTime}</p>
                                </div>
                                <div class="text-right">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${statusColor} bg-gray-100">
                                        ${b.status}
                                    </span>
                                </div>
                            </div>
                            <div class="mt-4 flex space-x-2">
                                <button onclick="updateBookingStatus('${b.id}', 'CONFIRMED')" class="text-xs bg-green-50 text-green-700 border border-green-200 px-2 py-1 rounded hover:bg-green-100">Confirm</button>
                                <button onclick="updateBookingStatus('${b.id}', 'COMPLETED')" class="text-xs bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded hover:bg-blue-100">Complete</button>
                                <button onclick="updateBookingStatus('${b.id}', 'CANCELLED')" class="text-xs bg-red-50 text-red-700 border border-red-200 px-2 py-1 rounded hover:bg-red-100">Cancel</button>
                            </div>
                        </li>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        async function updateBookingStatus(id, status) {
            try {
                const res = await fetch(`${API_URL}/bookings/${id}/status`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}` 
                    },
                    body: JSON.stringify({ status })
                });
                if (res.ok) fetchAdminBookings();
                else alert('Failed to update status');
            } catch (err) { console.error(err); }
        }

        async function deleteService(id) {
            if(!confirm('Are you sure you want to delete this service?')) return;
            try {
                const res = await fetch(`${API_URL}/services/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                if (res.ok) fetchAdminServices();
            } catch (err) { console.error(err); }
        }

        // Handle Create Service
        document.getElementById('service-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById('service-title').value,
                description: document.getElementById('service-desc').value,
                duration: parseInt(document.getElementById('service-duration').value),
                price: parseFloat(document.getElementById('service-price').value),
                isActive: true
            };
            
            try {
                const res = await fetch(`${API_URL}/services`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}` 
                    },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal('service-modal');
                    e.target.reset();
                    fetchAdminServices();
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.message}`);
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Initialize
        if (currentToken) showAdminView();
        else showPublicView();
    </script>
</body>
</html>
